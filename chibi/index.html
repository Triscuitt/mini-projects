<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moonlight Love</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Night sky background -->
  <div class="sky">
    <div class="stars" id="stars"></div>

    <div class="moon">
      <div class="moon-glow"></div>
      <div class="moon-craters">
        <span class="crater c1"></span>
        <span class="crater c2"></span>
        <span class="crater c3"></span>
      </div>
    </div>

    <div class="clouds">
      <div class="cloud cloud1"></div>
      <div class="cloud cloud2"></div>
      <div class="cloud cloud3"></div>
    </div>

    <div class="fireflies" id="fireflies"></div>
    <div class="hearts-container" id="heartsContainer"></div>
  </div>

  <!-- Rolling hill / field -->
  <div class="field">
    <div class="hill hill-back"></div>
    <div class="hill hill-front"></div>
    <div class="grass-glow"></div>
  </div>

  <!-- Scene with chibi + speech bubble -->
  <div class="scene">

    <div class="speech-bubble" id="speechBubble">
      <p id="speechText">I'm sorry, baby ko... ❤️🥺</p>
      <div class="bubble-pointer"></div>
    </div>

    <div class="chibi-wrap" id="chibiWrap">
      <div class="sparkle-burst" id="sparkleBurst"></div>

      <div class="chibi">
        <!-- Hair back -->
        <div class="hair-back"></div>

        <!-- Head -->
        <div class="head">
          <div class="blush blush-left"></div>
          <div class="blush blush-right"></div>
          <div class="eye eye-left"></div>
          <div class="eye eye-right"></div>
          <div class="mouth"></div>
          <div class="hair-front"></div>
        </div>

        <!-- Body -->
        <div class="body">
          <div class="arm arm-left"></div>
          <div class="arm arm-right"></div>
        </div>

        <!-- Bouquet / glowing heart held -->
        <div class="bouquet">
          <div class="flower f1"></div>
          <div class="flower f2"></div>
          <div class="flower f3"></div>
          <div class="stem"></div>
        </div>

        <!-- Legs -->
        <div class="legs">
          <div class="leg leg-left"></div>
          <div class="leg leg-right"></div>
        </div>
      </div>

      <div class="chibi-shadow"></div>
    </div>

  </div>

  <!-- Interactive button -->
  <div class="action-area">
    <button id="forgiveBtn" class="forgive-btn">
      <span id="btnText">Forgive Me? 💕</span>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
